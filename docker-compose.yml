version: '3.8'

# On-Premises dbt Deployment
# SQL Server is remote (10.200.207.194/TBXSQLAPPDES)
# Only the dbt container is deployed locally

services:
  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dbt_core_onpremise
    volumes:
      - ./dbt:/usr/app/dbt_project
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt_project
      - CLIENT_SQL_PASSWORD=${CLIENT_SQL_PASSWORD}
    command: tail -f /dev/null
    stdin_open: true
    tty: true