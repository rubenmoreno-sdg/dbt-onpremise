default:
  outputs:
    dev:
      type: sqlserver
      driver: 'ODBC Driver 18 for SQL Server'
      # 'sqlserver' is the Docker service name when running a local SQL Server container.
      # If you are connecting to the client's/server-hosted SQL Server, replace this
      # with the client's hostname or IP address (for example: dbserver.company.local).
      host: sqlserver
      port: 1433
      user: sa
      password: "{{ env_var('DBT_ENV_SECRET_PASSWORD') }}"
      database: master
      schema: dbo
      encrypt: true
      trust_cert: true
  target: dev

